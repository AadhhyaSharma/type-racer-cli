name: Build & Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
      - name: Build EXE
        run: |
          $launcher = (Get-ChildItem -Filter "*.py" | Where-Object { $_.Name -ne "setup.py" } | Select-Object -First 1).Name
          pyinstaller --onefile --name "${{ github.event.repository.name }}" $launcher
      - name: Zip EXE
        run: Compress-Archive -Path dist\*.exe -DestinationPath "${{ github.event.repository.name }}_windows.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.repository.name }}_windows"
          path: "${{ github.event.repository.name }}_windows.zip"
          retention-days: 30
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.event.repository.name }} ${{ github.ref_name }}"
          body: |
            ## ${{ github.ref_name }}

            Download the zip, unzip, double-click the `.exe` — no Python needed.

            > Built from ${{ github.sha }}
          files: "${{ github.event.repository.name }}_windows.zip"
